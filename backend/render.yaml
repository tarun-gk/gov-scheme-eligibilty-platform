services:
  - type: web
    name: gov-scheme-platform-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_ORIGIN
        value: https://your-vercel-frontend.vercel.app
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: API_RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: API_RATE_LIMIT_MAX_IP
        value: 120
      - key: API_RATE_LIMIT_MAX_USER
        value: 300
      - key: CACHE_TTL_SECONDS
        value: 600
      - key: QDRANT_COLLECTION
        value: scheme_embeddings
